name: Validate Skills

on:
  pull_request:
    paths:
      - 'skills/**'

jobs:
  validate-skills:
    name: Validate SKILL.md files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate skills
        run: npx @tanstack/intent@latest validate
