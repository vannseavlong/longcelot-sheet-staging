name: Check Stale Skills

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  check-stale-skills:
    name: Detect stale skills after release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check for stale skills
        run: npx @tanstack/intent@latest stale --json
        continue-on-error: true

      - name: Print stale skill report
        run: npx @tanstack/intent@latest stale
