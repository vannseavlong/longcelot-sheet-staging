name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
      - run: pnpm ci
      - run: pnpm run build
      - run: pnpm test
      - run: pnpm run lint
      - run: pnpm run format --check
      - run: pnpm audit --audit-level=high